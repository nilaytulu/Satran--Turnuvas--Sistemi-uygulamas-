version: '3.9'

services:
  web:
    build: .
    container_name: chesstms_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run_py.py
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-satranc-docker-secret-key}
      - DATABASE_URL=sqlite:////app/instance/chess.db
    volumes:
      # Kaynak kodu bağla (geliştirme için hot-reload)
      - .:/app
      # SQLite veritabanını kalıcı tut
      - chess_data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chess_data:
    driver: local
